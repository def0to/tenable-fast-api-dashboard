server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
        
        # NEVER cache index.html (entry point)
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }

    # Cache static assets (Vite generates hashed names like index-HASH.js)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    # Internal health check for Nginx
    location /health {
        access_log off;
        return 200 '{"status":"ok", "service":"frontend-nginx"}';
        add_header Content-Type application/json;
    }

    # Proxy API requests to the FastAPI backend
    location /api/ {
        # 'tenable-proxy' is the service name in docker-compose.yml
        proxy_pass http://tenable-proxy:8000/;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running Tenable queries
        proxy_connect_timeout 60s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;

        # Disable buffering for streaming-like large data sets
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
